<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ | NezStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header id="main-header" class="header">
        <div class="container header-container">
            <div class="logo">
                <a href="#"><img src="img/banner/NezStore.png" alt="logo"> </a>
            </div>
            <nav class="main-nav">
                <ul class="nav-list">
                    <li class="nav-item"><a href="index.html" class="nav-link">Trang chủ</a></li>
                    <li class="nav-item"><a href="index.html" class="nav-link">Sản phẩm</a></li>
                    <li class="nav-item"><a href="contact.html" class="nav-link" style="border-bottom: 2px solid var(--color-primary)">Liên hệ</a></li>
                    <li class="nav-item"><a href="blog.html" class="nav-link">Blog</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <div class="user-dropdown-wrap">
                    <button class="action-btn user-btn" title="Tài khoản" onclick="window.location.href='profile.html'">
                        <i class="ph ph-user"></i>
                    </button>
                    <div class="user-dropdown">
                        <a href="login.html">Đăng nhập</a>
                        <a href="register.html">Đăng ký</a>
                        <a href="profile.html">Hồ sơ</a>
                    </div>
                </div>
                <button class="action-btn cart-btn" title="Giỏ hàng" onclick="window.location.href='cart.html'">
                    <i class="ph ph-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <section class="container section-padding" style="max-width: 800px; margin: 0 auto; min-height: 60vh;">
            <h1 class="text-center mb-40">Liên Hệ</h1>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 40px;">
                <div>
                    <h3 style="margin-bottom:20px;">Thông Tin Liên Hệ</h3>
                    <p style="margin-bottom:10px;"><strong>Địa chỉ:</strong> 123 Đường Fashion, Quận 1, TP.HCM</p>
                    <p style="margin-bottom:10px;"><strong>Điện thoại:</strong> 1900 1234</p>
                    <p style="margin-bottom:10px;"><strong>Email:</strong> support@NezStore.vn</p>
                </div>
                <form style="display:flex; flex-direction:column; gap:20px;">
                    <input type="text" placeholder="Họ và tên" style="padding:15px; border:1px solid var(--color-border); font-family: var(--font-body);" required>
                    <input type="email" placeholder="Email" style="padding:15px; border:1px solid var(--color-border); font-family: var(--font-body);" required>
                    <textarea placeholder="Tin nhắn của bạn" style="padding:15px; border:1px solid var(--color-border); font-family: var(--font-body); height:150px; resize:vertical;" required></textarea>
                    <button type="submit" class="btn btn-primary" style="padding:15px;">GỬI TIN NHẮN</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer" style="padding-top: 20px;">
        <div class="footer-bottom">
            <p>&copy; 2026 NezStore. All rights reserved.</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
