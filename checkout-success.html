<!DOCTYPE html>
<html lang="vi">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header id="main-header" class="header">
        <div class="container header-container">
            <div class="logo">
                <a href="#"><img src="img/banner/NezStore.png" alt="logo"> </a>
            </div>
            <nav class="main-nav">
                <ul class="nav-list">
                    <li class="nav-item"><a href="index.html" class="nav-link">Trang chủ</a></li>
                    <li class="nav-item"><a href="products.html" class="nav-link">Sản phẩm</a></li>
                    <li class="nav-item"><a href="contact.html" class="nav-link">Liên hệ</a></li>
                    <li class="nav-item"><a href="blog.html" class="nav-link">Blog</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button class="action-btn cart-btn" title="Giỏ hàng" onclick="window.location.href='cart.html'">
                    <i class="ph ph-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <main style="display:flex; align-items:center; justify-content:center; min-height:60vh; text-align:center;">
        <section class="container section-padding">
            <i class="ph ph-check-circle" style="font-size:80px; color:#4caf50; margin-bottom:20px;"></i>
            <h1 style="margin-bottom:15px; font-size:32px;">ĐẶT HÀNG THÀNH CÔNG!</h1>
            <p style="color:var(--color-text-light); margin-bottom:30px; font-size:16px;">Cảm ơn bạn đã tin tưởng và mua sắm tại NezStore. Đơn hàng của bạn đang được xử lý và sẽ sớm được giao.</p>
            <a href="products.html" class="btn btn-primary" style="font-size:16px; padding:15px 30px;">TIẾP TỤC MUA SẮM</a>
        </section>
    </main>

    <footer class="footer" style="padding-top: 20px;">
        <div class="footer-bottom">
            <p>&copy; 2026 NezStore. All rights reserved.</p>
        </div>
    </footer>
    <script src="script.js"></script>
