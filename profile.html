<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ | NezStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header id="main-header" class="header">
        <div class="container header-container">
            <div class="logo">
                <a href="#"><img src="img/banner/NezStore.png" alt="logo"> </a>
            </div>
            <nav class="main-nav">
                <ul class="nav-list">
                    <li class="nav-item"><a href="index.html" class="nav-link">Trang chủ</a></li>
                    <li class="nav-item"><a href="index.html" class="nav-link">Sản phẩm</a></li>
                    <li class="nav-item"><a href="contact.html" class="nav-link">Liên hệ</a></li>
                    <li class="nav-item"><a href="blog.html" class="nav-link">Blog</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button class="action-btn cart-btn" title="Giỏ hàng" onclick="window.location.href='cart.html'">
                    <i class="ph ph-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <section class="container section-padding" style="min-height: 60vh;">
            <h1 class="text-center mb-40">Hồ Sơ Của Tôi</h1>
            <div style="display:flex; gap:40px; flex-wrap: wrap;">
                <div style="width: 250px; flex-shrink: 0;">
                    <ul style="border:1px solid var(--color-border); border-radius:4px; overflow:hidden;">
                        <li style="padding:15px; border-bottom:1px solid var(--color-border); background:var(--color-primary); color:white;">Thông tin tài khoản</li>
                        <li style="padding:15px; border-bottom:1px solid var(--color-border);"><a href="#">Đơn hàng của tôi</a></li>
                        <li style="padding:15px; border-bottom:1px solid var(--color-border);"><a href="#">Sổ địa chỉ</a></li>
                        <li style="padding:15px;"><a href="login.html" style="color:red;">Đăng xuất</a></li>
                    </ul>
                </div>
                <div style="flex-grow: 1; border:1px solid var(--color-border); padding:30px; border-radius:4px;">
                    <h3 style="margin-bottom:20px;">Thông tin cá nhân</h3>
                    <form style="display:flex; flex-direction:column; gap:20px; max-width:500px;">
                        <div>
                            <label style="display:block; margin-bottom:5px; font-weight:600;">Họ và tên</label>
                            <input type="text" value="Nguyễn Văn A" style="padding:10px; border:1px solid var(--color-border); width:100%; font-family: var(--font-body);">
                        </div>
                        <div>
                            <label style="display:block; margin-bottom:5px; font-weight:600;">Email</label>
                            <input type="email" value="nguyenvana@gmail.com" disabled style="padding:10px; border:1px solid var(--color-border); width:100%; font-family: var(--font-body); background:#f5f5f5; color:#777;">
                        </div>
                        <div>
                            <label style="display:block; margin-bottom:5px; font-weight:600;">Số điện thoại</label>
                            <input type="text" value="0901234567" style="padding:10px; border:1px solid var(--color-border); width:100%; font-family: var(--font-body);">
                        </div>
                        <button type="button" class="btn btn-primary" style="align-self:flex-start;">CẬP NHẬT</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer" style="padding-top: 20px;">
        <div class="footer-bottom">
            <p>&copy; 2026 NezStore. All rights reserved.</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
